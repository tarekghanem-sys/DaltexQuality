/* ─── HELPERS ─── */
function scoreColor(s){return s>=85?'#1e6b3a':s>=70?'#b87820':'#b03030';}
function scoreBg(s){return s>=85?'#e8f5ec':s>=70?'#fdf3e0':'#faeaea';}
function totalScore(defects){
  var t=0;
  for(var k in defects) t+=parseFloat(defects[k])||0;
  return Math.round(t*10)/10;
}
function hasCritical(defects){
  var critKeys=['thrips','scale','mealy','fruit_fly','alternaria','black_rot','brown_rot','penicillium'];
  for(var i=0;i<critKeys.length;i++){if((parseFloat(defects[critKeys[i]])||0)>0) return true;}
  return false;
}
function decisionBadge(d){
  if(d==='A') return ce('span',{className:'badge badge-pass'},'Accept');
  if(d==='R') return ce('span',{className:'badge badge-fail'},'Reject');
  return ce('span',{className:'badge badge-neutral'},d);
}
function StatusBadge(props){
  var map={Released:'pass',Hold:'warn',Rework:'hold'};
  return ce('span',{className:'badge badge-'+(map[props.s]||'neutral')},props.s);
}
function Ring(props){
  var sz=props.size||40,s=props.score;
  return ce('div',{style:{width:sz,height:sz,borderRadius:'50%',background:scoreBg(s),border:'1.5px solid '+scoreColor(s)+'60',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--font-display)',fontSize:Math.floor(sz*.36),color:scoreColor(s),flexShrink:0}},s);
}

/* ─── MINI CHARTS ─── */
function MiniLine(props){
  var data=props.data,k1=props.k1,k2=props.k2;
  var W=500,H=140,pl=26,pr=8,pt=6,pb=22;
  var pw=W-pl-pr,ph=H-pt-pb,yMin=60,yMax=100;
  function xs(i){return pl+i/(data.length-1)*pw;}
  function ys(v){return pt+ph-(v-yMin)/(yMax-yMin)*ph;}
  return ce('svg',{viewBox:'0 0 '+W+' '+H,width:'100%'},
    [0,.5,1].map(function(f,i){var y=pt+f*ph,v=Math.round(yMax-f*(yMax-yMin));return ce('g',{key:i},ce('line',{x1:pl,y1:y,x2:W-pr,y2:y,stroke:'#d0cbbe',strokeWidth:.5}),ce('text',{x:pl-4,y:y,textAnchor:'end',dominantBaseline:'middle',fontSize:9,fill:'#7a7668'},v));}),
    data.map(function(d,i){return ce('text',{key:'x'+i,x:xs(i),y:H-4,textAnchor:'middle',fontSize:9,fill:'#7a7668'},d.m);}),
    ce('polyline',{points:data.map(function(d,i){return xs(i)+','+ys(d[k1]);}).join(' '),fill:'none',stroke:'#2b5c3f',strokeWidth:1.8,strokeLinejoin:'round'}),
    ce('polyline',{points:data.map(function(d,i){return xs(i)+','+ys(d[k2]);}).join(' '),fill:'none',stroke:'#b03030',strokeWidth:1.8,strokeLinejoin:'round',strokeDasharray:'5 3'}),
    data.map(function(d,i){return ce('circle',{key:'a'+i,cx:xs(i),cy:ys(d[k1]),r:2.5,fill:'#2b5c3f',stroke:'#fff',strokeWidth:1.2});}),
    data.map(function(d,i){return ce('circle',{key:'b'+i,cx:xs(i),cy:ys(d[k2]),r:2.5,fill:'#b03030',stroke:'#fff',strokeWidth:1.2});})

/* ─── LIVE CLOCK ─── */
function LiveClock(){
  var st=useState(function(){var n=new Date();return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');});
  var time=st[0]; var setTime=st[1];
  React.useEffect(function(){
    var tick=setInterval(function(){
      var n=new Date();
      setTime(String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0'));
    },1000);
    return function(){clearInterval(tick);};
  },[]);
  return ce('div',{style:{display:'flex',alignItems:'center',gap:6,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:6,padding:'4px 10px'}},
    ce('svg',{width:12,height:12,viewBox:'0 0 16 16',fill:'var(--text3)'},

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Daltex QC</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0ede6;--bg2:#e8e4da;--bg3:#ddd8cc;
  --sidebar:#1e2d22;--sidebar2:#263529;
  --sidebar-text:#c8d4c0;--sidebar-muted:#6a8068;
  --accent:#2b5c3f;--accent2:#4a8c62;
  --amber:#b87820;--amber-bg:#fdf3e0;--amber-border:#e8c87a;
  --red:#b03030;--red-bg:#faeaea;--red-border:#e8a0a0;
  --green:#1e6b3a;--green-bg:#e8f5ec;--green-border:#8ecba4;
  --text:#1a1a17;--text2:#4a4840;--text3:#7a7668;
  --border:#d0cbbe;--border2:#bcb8ae;--card:#ffffff;
  --font-display:'DM Serif Display',serif;
  --font-body:'Instrument Sans',sans-serif;
  --font-mono:'DM Mono',monospace;
  --r:8px;--r2:12px;
  --sidebar-w:218px;
}
html,body,#root{height:100%;font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
button{font-family:var(--font-body);cursor:pointer;border:none;background:none}
input,select,textarea{font-family:var(--font-body);font-size:13px;color:var(--text)}

/* LANDING */
.landing{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px}
.landing-logo{font-family:var(--font-display);font-size:32px;color:var(--text)}
.landing-sub{font-size:12px;color:var(--text3);margin-top:5px;letter-spacing:.06em;text-transform:uppercase}
.landing-prompt{font-size:15px;color:var(--text2);margin-top:30px;margin-bottom:32px}
.crop-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,200px));gap:14px;justify-content:center}
.crop-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 16px 16px;cursor:pointer;transition:transform .18s,box-shadow .18s,border-color .18s}
.crop-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.09);border-color:var(--border2)}
.crop-icon-wrap{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.crop-name{font-family:var(--font-display);font-size:18px;color:var(--text);margin-bottom:4px}
.crop-vars{font-size:11px;color:var(--text3);line-height:1.6;margin-bottom:12px}
.crop-stat{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px}
.crop-stat-label{color:var(--text3)}
.crop-stat-val{font-family:var(--font-mono);color:var(--text2);font-weight:500}

/* APP LAYOUT */
.layout{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--sidebar);display:flex;flex-direction:column;overflow:hidden;transition:transform .2s}
.sidebar-logo{padding:16px 18px 12px;border-bottom:1px solid rgba(255,255,255,.07)}
.sidebar-logo-mark{font-family:var(--font-display);font-size:19px;color:#fff}
.sidebar-logo-crop{font-size:10px;color:var(--sidebar-muted);letter-spacing:.08em;text-transform:uppercase;margin-top:3px;display:flex;align-items:center;gap:5px}
.sidebar-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sidebar-sec{padding:16px 12px 5px;font-size:10px;color:var(--sidebar-muted);letter-spacing:.1em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:6px;margin:1px 8px;color:var(--sidebar-text);font-size:13px;cursor:pointer;transition:background .15s,color .15s}
.nav-item:hover{background:var(--sidebar2);color:#fff}
.nav-item.active{background:var(--accent);color:#fff;font-weight:500}
.nav-icon{width:14px;height:14px;flex-shrink:0;opacity:.65}
.nav-item.active .nav-icon{opacity:1}
.sidebar-bottom{margin-top:auto;padding:10px 8px;border-top:1px solid rgba(255,255,255,.06)}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:0 16px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;flex-shrink:0;gap:8px}
.topbar-left{display:flex;align-items:center;gap:8px;min-width:0;flex:1}
.topbar-title{font-family:var(--font-display);font-size:17px;white-space:nowrap}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.page{padding:16px;flex:1}

/* MOBILE BOTTOM NAV (hidden on desktop) */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:56px;background:var(--sidebar);border-top:1px solid rgba(255,255,255,.1);z-index:50;flex-direction:row;align-items:stretch}
.mobile-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--sidebar-muted);font-size:10px;cursor:pointer;padding:6px 4px;transition:color .15s}
.mobile-nav-item.active{color:#fff}
.mobile-nav-item svg{width:18px;height:18px;opacity:.7}
.mobile-nav-item.active svg{opacity:1}
/* hamburger toggle for mobile sidebar */
.menu-btn{display:none;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;background:var(--sidebar);cursor:pointer;flex-shrink:0}
.menu-btn svg{width:18px;height:18px;fill:#fff}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:40}

/* COMPONENTS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px}
.section-title{font-size:10px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.section-title-bar{height:2px;width:20px;border-radius:1px;flex-shrink:0}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px}
.kpi-label{font-size:11px;color:var(--text3);margin-bottom:4px;font-weight:500}
.kpi-value{font-family:var(--font-display);font-size:26px;line-height:1}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:4px}
.kpi-sub.up{color:var(--green)}.kpi-sub.down{color:var(--red)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.badge-pass{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.badge-warn{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.badge-fail{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.badge-hold{background:#fff3e0;color:#b06010;border:1px solid #e8c090}
.badge-neutral{background:var(--bg2);color:var(--text2);border:1px solid var(--border)}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:600px}
th{text-align:left;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);padding:7px 10px;border-bottom:2px solid var(--border2);white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.click{cursor:pointer}
tr.click:hover td{background:var(--bg)}
.tabs{display:flex;gap:2px;border-bottom:2px solid var(--border);margin-bottom:18px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:7px 14px;font-size:13px;font-weight:500;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer;transition:color .15s,border-color .15s;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid transparent;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--card);color:var(--text2);border-color:var(--border2)}
.btn-secondary:hover{background:var(--bg2)}
.btn-sm{padding:4px 10px;font-size:12px}
.scroll-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.scroll-card .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.lot{font-family:var(--font-mono);font-size:11px;background:var(--bg2);padding:2px 6px;border-radius:4px;color:var(--text2)}
.sep{height:1px;background:var(--border);margin:12px 0}
.alert-warn{background:#fff3e0;border:1px solid #e8c090;border-radius:6px;padding:8px 12px;margin-bottom:12px;font-size:12px;color:#7a4a10}
.alert-fail{background:var(--red-bg);border:1px solid var(--red-border);border-radius:6px;padding:8px 12px;margin-bottom:12px;font-size:12px;color:var(--red)}
.dp{border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.dp-hdr{background:var(--bg2);padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.dp-body{padding:14px;font-size:13px;max-height:calc(100vh - 120px);overflow-y:auto}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:14px}
.grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:12px}

/* INSPECTION FORM */
.form-field{margin-bottom:10px}
.form-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;display:block}
.form-input{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:6px;background:var(--card);outline:none;transition:border-color .15s;font-size:14px;color:var(--text)}
.form-input:focus{border-color:var(--accent)}
.form-select{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:6px;background:var(--card);outline:none;font-size:14px;color:var(--text)}
.defect-section{margin-bottom:16px}
.defect-section-header{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:6px 10px;border-radius:5px;margin-bottom:8px}
.defect-row{display:grid;grid-template-columns:1fr 90px 55px 60px;gap:6px;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)}
.defect-row:last-child{border-bottom:none}
.defect-input{width:100%;padding:4px 7px;border:1px solid var(--border2);border-radius:4px;background:var(--card);font-family:var(--font-mono);font-size:12px;text-align:right;outline:none}
.defect-input:focus{border-color:var(--accent)}
.defect-input.over{border-color:var(--red);background:var(--red-bg);color:var(--red)}
.defect-thresh{font-size:10px;color:var(--text3);text-align:right}
.total-row{display:grid;grid-template-columns:1fr 90px 55px 60px;gap:6px;align-items:center;padding:8px 10px;background:var(--bg2);border-radius:6px;margin-top:8px}
.total-label{font-size:12px;font-weight:600;color:var(--text)}
.total-val{font-family:var(--font-mono);font-size:14px;font-weight:600;text-align:right}
.clearance-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.clearance-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--bg2);border-radius:6px;font-size:11px}
.clearance-label{color:var(--text2);flex:1;margin-right:8px}
.toggle-wrap{display:flex;gap:4px}
.toggle-btn{padding:4px 10px;border-radius:4px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--card);color:var(--text3);transition:all .12s}
.toggle-btn.active-comply{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.toggle-btn.active-non{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.decision-bar{display:flex;gap:8px;margin-top:14px}
.decision-btn{flex:1;padding:10px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all .15s;text-align:center}
.decision-a{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.decision-a:hover,.decision-a.sel{background:var(--green);color:#fff;border-color:var(--green)}
.decision-r{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.decision-r:hover,.decision-r.sel{background:var(--red);color:#fff;border-color:var(--red)}
.wax-options{display:flex;gap:6px;flex-wrap:wrap}
.wax-btn{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--card);color:var(--text3);transition:all .12s}
.wax-btn.sel{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── RESPONSIVE BREAKPOINTS ── */

/* Tablet: 768px–1024px */
@media(max-width:1024px){
  :root{--sidebar-w:190px}
  .page{padding:14px}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .grid4{grid-template-columns:repeat(2,minmax(0,1fr))}
  .grid3{grid-template-columns:repeat(2,minmax(0,1fr))}
  .topbar-title{font-size:15px}
  .kpi-value{font-size:22px}
}

/* Mobile: up to 767px */
@media(max-width:767px){
  /* Sidebar becomes slide-in drawer */
  .sidebar{position:fixed;top:0;left:0;bottom:0;z-index:41;transform:translateX(-100%);width:240px!important;min-width:0!important}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .mobile-nav{display:flex}
  .menu-btn{display:flex}
  /* Push content above bottom nav */
  .layout{flex-direction:column;height:auto;min-height:100vh}

function scoreColor(s){return s>=85?'#1e6b3a':s>=70?'#b87820':'#b03030';}

function totalScore(defects){
  var t=0;
  for(var k in defects) t+=parseFloat(defects[k])||0;
  return Math.round(t*10)/10;
}
function hasCritical(defects){
  var critKeys=['thrips','scale','mealy','fruit_fly','alternaria','black_rot','brown_rot','penicillium'];
  for(var i=0;i<critKeys.length;i++){if((parseFloat(defects[critKeys[i]])||0)>0) return true;}
