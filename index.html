<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DalOS Vision</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0ede6;--bg2:#e8e4da;--bg3:#ddd8cc;
  --sidebar:#1e2d22;--sidebar2:#263529;
  --sidebar-text:#c8d4c0;--sidebar-muted:#6a8068;
  --accent:#2b5c3f;--accent2:#4a8c62;
  --amber:#b87820;--amber-bg:#fdf3e0;--amber-border:#e8c87a;
  --red:#b03030;--red-bg:#faeaea;--red-border:#e8a0a0;
  --green:#1e6b3a;--green-bg:#e8f5ec;--green-border:#8ecba4;
  --text:#1a1a17;--text2:#4a4840;--text3:#7a7668;
  --border:#d0cbbe;--border2:#bcb8ae;--card:#ffffff;
  --font-display:'DM Serif Display',serif;
  --font-body:'Instrument Sans',sans-serif;
  --font-mono:'DM Mono',monospace;
  --r:8px;--r2:12px;
  --sidebar-w:218px;
}
html,body,#root{height:100%;font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
button{font-family:var(--font-body);cursor:pointer;border:none;background:none}
input,select,textarea{font-family:var(--font-body);font-size:13px;color:var(--text)}

/* LANDING */
.landing{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px}
.landing-logo{font-family:var(--font-display);font-size:32px;color:var(--text)}
.landing-sub{font-size:12px;color:var(--text3);margin-top:5px;letter-spacing:.06em;text-transform:uppercase}
.landing-prompt{font-size:15px;color:var(--text2);margin-top:30px;margin-bottom:32px}
.crop-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,200px));gap:14px;justify-content:center}
.crop-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 16px 16px;cursor:pointer;transition:transform .18s,box-shadow .18s,border-color .18s}
.crop-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.09);border-color:var(--border2)}
.crop-icon-wrap{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.crop-name{font-family:var(--font-display);font-size:18px;color:var(--text);margin-bottom:4px}
.crop-vars{font-size:11px;color:var(--text3);line-height:1.6;margin-bottom:12px}
.crop-stat{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px}
.crop-stat-label{color:var(--text3)}
.crop-stat-val{font-family:var(--font-mono);color:var(--text2);font-weight:500}

/* APP LAYOUT */
.layout{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--sidebar);display:flex;flex-direction:column;overflow:hidden;transition:transform .2s}
.sidebar-logo{padding:16px 18px 12px;border-bottom:1px solid rgba(255,255,255,.07)}
.sidebar-logo-mark{font-family:var(--font-display);font-size:19px;color:#fff}
.sidebar-logo-crop{font-size:10px;color:var(--sidebar-muted);letter-spacing:.08em;text-transform:uppercase;margin-top:3px;display:flex;align-items:center;gap:5px}
.sidebar-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sidebar-sec{padding:16px 12px 5px;font-size:10px;color:var(--sidebar-muted);letter-spacing:.1em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:6px;margin:1px 8px;color:var(--sidebar-text);font-size:13px;cursor:pointer;transition:background .15s,color .15s}
.nav-item:hover{background:var(--sidebar2);color:#fff}
.nav-item.active{background:var(--accent);color:#fff;font-weight:500}
.nav-icon{width:14px;height:14px;flex-shrink:0;opacity:.65}
.nav-item.active .nav-icon{opacity:1}
.sidebar-bottom{margin-top:auto;padding:10px 8px;border-top:1px solid rgba(255,255,255,.06)}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:0 16px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;flex-shrink:0;gap:8px}
.topbar-left{display:flex;align-items:center;gap:8px;min-width:0;flex:1}
.topbar-title{font-family:var(--font-display);font-size:17px;white-space:nowrap}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.page{padding:16px;flex:1}

/* MOBILE BOTTOM NAV (hidden on desktop) */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:56px;background:var(--sidebar);border-top:1px solid rgba(255,255,255,.1);z-index:50;flex-direction:row;align-items:stretch}
.mobile-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--sidebar-muted);font-size:10px;cursor:pointer;padding:6px 4px;transition:color .15s}
.mobile-nav-item.active{color:#fff}
.mobile-nav-item svg{width:18px;height:18px;opacity:.7}
.mobile-nav-item.active svg{opacity:1}
/* hamburger toggle for mobile sidebar */
.menu-btn{display:none;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;background:var(--sidebar);cursor:pointer;flex-shrink:0}
.menu-btn svg{width:18px;height:18px;fill:#fff}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:40}

/* COMPONENTS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px}
.section-title{font-size:10px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.section-title-bar{height:2px;width:20px;border-radius:1px;flex-shrink:0}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px}
.kpi-label{font-size:11px;color:var(--text3);margin-bottom:4px;font-weight:500}
.kpi-value{font-family:var(--font-display);font-size:26px;line-height:1}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:4px}
.kpi-sub.up{color:var(--green)}.kpi-sub.down{color:var(--red)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.badge-pass{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.badge-warn{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.badge-fail{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.badge-hold{background:#fff3e0;color:#b06010;border:1px solid #e8c090}
.badge-escalated{background:#e8eeff;color:#2a50c0;border:1px solid #a0b4e8;font-weight:600}
.badge-special-accept{background:#f0e8ff;color:#6a10b0;border:1px solid #c090e0;font-weight:600}
.badge-special-reject{background:#fff0e8;color:#b04010;border:1px solid #e0b090;font-weight:600}
.badge-neutral{background:var(--bg2);color:var(--text2);border:1px solid var(--border)}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:600px}
th{text-align:left;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);padding:7px 10px;border-bottom:2px solid var(--border2);white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.click{cursor:pointer}
tr.click:hover td{background:var(--bg)}
.tabs{display:flex;gap:2px;border-bottom:2px solid var(--border);margin-bottom:18px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:7px 14px;font-size:13px;font-weight:500;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer;transition:color .15s,border-color .15s;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid transparent;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--card);color:var(--text2);border-color:var(--border2)}
.btn-secondary:hover{background:var(--bg2)}
.btn-sm{padding:4px 10px;font-size:12px}
.scroll-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.scroll-card .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.lot{font-family:var(--font-mono);font-size:11px;background:var(--bg2);padding:2px 6px;border-radius:4px;color:var(--text2)}
.sep{height:1px;background:var(--border);margin:12px 0}
.alert-warn{background:#fff3e0;border:1px solid #e8c090;border-radius:6px;padding:8px 12px;margin-bottom:12px;font-size:12px;color:#7a4a10}
.alert-fail{background:var(--red-bg);border:1px solid var(--red-border);border-radius:6px;padding:8px 12px;margin-bottom:12px;font-size:12px;color:var(--red)}
.dp{border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.dp-hdr{background:var(--bg2);padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.dp-body{padding:14px;font-size:13px;max-height:calc(100vh - 120px);overflow-y:auto}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:14px}
.grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:12px}

/* INSPECTION FORM */
.form-field{margin-bottom:10px}
.form-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;display:block}
.form-input{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:6px;background:var(--card);outline:none;transition:border-color .15s;font-size:14px;color:var(--text)}
.form-input:focus{border-color:var(--accent)}
.form-select{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:6px;background:var(--card);outline:none;font-size:14px;color:var(--text)}
.defect-section{margin-bottom:16px}
.defect-section-header{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:6px 10px;border-radius:5px;margin-bottom:8px}
.defect-row{display:grid;grid-template-columns:1fr 90px 55px 60px;gap:6px;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)}
.defect-row:last-child{border-bottom:none}
.defect-input{width:100%;padding:4px 7px;border:1px solid var(--border2);border-radius:4px;background:var(--card);font-family:var(--font-mono);font-size:12px;text-align:right;outline:none}
.defect-input:focus{border-color:var(--accent)}
.defect-input.over{border-color:var(--red);background:var(--red-bg);color:var(--red)}
.defect-thresh{font-size:10px;color:var(--text3);text-align:right}
.total-row{display:grid;grid-template-columns:1fr 90px 55px 60px;gap:6px;align-items:center;padding:8px 10px;background:var(--bg2);border-radius:6px;margin-top:8px}
.total-label{font-size:12px;font-weight:600;color:var(--text)}
.total-val{font-family:var(--font-mono);font-size:14px;font-weight:600;text-align:right}
.clearance-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.clearance-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--bg2);border-radius:6px;font-size:11px}
.clearance-label{color:var(--text2);flex:1;margin-right:8px}
.toggle-wrap{display:flex;gap:4px}
.toggle-btn{padding:4px 10px;border-radius:4px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--card);color:var(--text3);transition:all .12s}
.toggle-btn.active-comply{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.toggle-btn.active-non{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.decision-bar{display:flex;gap:8px;margin-top:14px}
.decision-btn{flex:1;padding:10px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all .15s;text-align:center}
.decision-a{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.decision-a:hover,.decision-a.sel{background:var(--green);color:#fff;border-color:var(--green)}
.decision-r{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.decision-r:hover,.decision-r.sel{background:var(--red);color:#fff;border-color:var(--red)}
.wax-options{display:flex;gap:6px;flex-wrap:wrap}
.wax-btn{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--card);color:var(--text3);transition:all .12s}
.wax-btn.sel{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── RESPONSIVE BREAKPOINTS ── */

/* Tablet: 768px–1024px */
@media(max-width:1024px){
  :root{--sidebar-w:190px}
  .page{padding:14px}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .grid4{grid-template-columns:repeat(2,minmax(0,1fr))}
  .grid3{grid-template-columns:repeat(2,minmax(0,1fr))}
  .topbar-title{font-size:15px}
  .kpi-value{font-size:22px}
}

/* Mobile: up to 767px */
@media(max-width:767px){
  /* Sidebar becomes slide-in drawer */
  .sidebar{position:fixed;top:0;left:0;bottom:0;z-index:41;transform:translateX(-100%);width:240px!important;min-width:0!important}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .mobile-nav{display:flex}
  .menu-btn{display:flex}
  /* Push content above bottom nav */
  .layout{flex-direction:column;height:auto;min-height:100vh}
  .main{padding-bottom:60px}
  /* Page padding */
  .page{padding:12px}
  /* Topbar */
  .topbar{padding:0 12px;height:48px}
  .topbar-title{font-size:15px}
  /* KPIs — 2 columns on mobile */
  .kpi-grid{grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
  .kpi{padding:10px 12px}
  .kpi-value{font-size:20px}
  .kpi-sub{font-size:10px}
  /* Grids — single column */
  .grid4{grid-template-columns:1fr}
  .grid3{grid-template-columns:1fr}
  .grid2{grid-template-columns:1fr}
  /* Cards */
  .card{padding:12px}
  /* Detail panel — full width */
  .dp{margin-top:12px}
  .dp-body{max-height:none}
  /* Clearance grid */
  .clearance-grid{grid-template-columns:1fr}
  .clearance-item{flex-wrap:wrap;gap:6px}
  /* Decision bar */
  .decision-bar{flex-direction:column}
  /* Tabs scroll */
  .tabs{overflow-x:auto}
  .tab{padding:6px 12px;font-size:12px}
  /* Buttons */
  .btn{padding:8px 12px;font-size:13px}
  .btn-sm{padding:6px 10px;font-size:12px}
  /* Landing packhouses */
  .ph-grid{grid-template-columns:1fr!important}
  /* Sample rows — horizontal scroll */
  .sample-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
}

/* Very small phones */
@media(max-width:380px){
  .kpi-grid{grid-template-columns:1fr}
  .topbar-title{font-size:14px}
}

/* Sticker section — always single column on mobile */
@media(max-width:767px){
  .sticker-grid{grid-template-columns:1fr!important}
  .topbar-badge{display:none}
  .form-topbar{flex-wrap:wrap;height:auto!important;padding:8px 12px!important;gap:6px}
  .form-topbar-right{flex-wrap:wrap;gap:6px}
  .inspection-page{padding:12px 10px!important}
}
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>

<script type="text/javascript">
var useState = React.useState;
var ce = React.createElement;
var Frag = React.Fragment;

/* ─── CITRUS INSPECTION TEMPLATE (from KZ CSV) ─── */

    { key:'oil_spots',  en:'Oil spots / bruising',      ar:'كدمات',          sev:'Minor',    thresh:6  },

var CITRUS_VARIETIES = ['Navel','Navelina Navel','Lanelate Navel','Caracara Navel','Valencia','Midknight Valencia','Olinda Valencia','Pineapple Early Valencia','Salustiana Early Valencia','Eureka Lemon','Star Ruby Grapefruit','Nova Mandarin'];
var CITRUS_SIZES = ['18','23','24','30','36','40','48','55','56','64','72','80','88','100','102','105','113','115','125','126','137','138','150','162','168','200'];

var CLEARANCE_ITEMS = [

var SECTION_COLORS = {External:'#e8f5ec',Insect:'#fff3e0',Internal:'#f0eeff',Rot:'#faeaea',Harvest:'#fffaee'};
var SECTION_TEXT   = {External:'#1e6b3a',Insect:'#8a3a1a',Internal:'#5a2a9a',Rot:'#8a1a1a',Harvest:'#5a4a10'};

/* ─── HELPERS ─── */
function scoreColor(s){return s>=85?'#1e6b3a':s>=70?'#b87820':'#b03030';}
function scoreBg(s){return s>=85?'#e8f5ec':s>=70?'#fdf3e0':'#faeaea';}
function totalScore(defects){
  var t=0;
  for(var k in defects) t+=parseFloat(defects[k])||0;
  return Math.round(t*10)/10;
}
function hasCritical(defects){
  var critKeys=['thrips','scale','mealy','fruit_fly','alternaria','black_rot','brown_rot','penicillium'];
  for(var i=0;i<critKeys.length;i++){if((parseFloat(defects[critKeys[i]])||0)>0) return true;}
  return false;
}
function decisionBadge(d){
  if(d==='A') return ce('span',{className:'badge badge-pass'},'Accept');
  if(d==='R') return ce('span',{className:'badge badge-fail'},'Reject');
  if(d==='SA') return ce('span',{className:'badge badge-special-accept'},'★ Special Accept');
  if(d==='SR') return ce('span',{className:'badge badge-special-reject'},'★ Special Reject');
  return ce('span',{className:'badge badge-neutral'},d||'—');
}
function StatusBadge(props){
  var s=props.s||'';
  var cls=s==='Released'?'pass':s==='Hold'||s==='Rework'?'warn':s==='Escalated'?'escalated':s==='Special Accept'?'special-accept':s==='Special Reject'?'special-reject':'neutral';
  return ce('span',{className:'badge badge-'+cls},s);
}
function Ring(props){
  var sz=props.size||40,s=props.score;
  return ce('div',{style:{width:sz,height:sz,borderRadius:'50%',background:scoreBg(s),border:'1.5px solid '+scoreColor(s)+'60',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--font-display)',fontSize:Math.floor(sz*.36),color:scoreColor(s),flexShrink:0}},s);
}

/* ─── MINI CHARTS ─── */
function MiniLine(props){
  var data=props.data,k1=props.k1,k2=props.k2;
  var W=500,H=140,pl=26,pr=8,pt=6,pb=22;
  var pw=W-pl-pr,ph=H-pt-pb,yMin=60,yMax=100;
  function xs(i){return pl+i/(data.length-1)*pw;}
  function ys(v){return pt+ph-(v-yMin)/(yMax-yMin)*ph;}
  return ce('svg',{viewBox:'0 0 '+W+' '+H,width:'100%'},
    [0,.5,1].map(function(f,i){var y=pt+f*ph,v=Math.round(yMax-f*(yMax-yMin));return ce('g',{key:i},ce('line',{x1:pl,y1:y,x2:W-pr,y2:y,stroke:'#d0cbbe',strokeWidth:.5}),ce('text',{x:pl-4,y:y,textAnchor:'end',dominantBaseline:'middle',fontSize:9,fill:'#7a7668'},v));}),
    data.map(function(d,i){return ce('text',{key:'x'+i,x:xs(i),y:H-4,textAnchor:'middle',fontSize:9,fill:'#7a7668'},d.m);}),
    ce('polyline',{points:data.map(function(d,i){return xs(i)+','+ys(d[k1]);}).join(' '),fill:'none',stroke:'#2b5c3f',strokeWidth:1.8,strokeLinejoin:'round'}),
    ce('polyline',{points:data.map(function(d,i){return xs(i)+','+ys(d[k2]);}).join(' '),fill:'none',stroke:'#b03030',strokeWidth:1.8,strokeLinejoin:'round',strokeDasharray:'5 3'}),
    data.map(function(d,i){return ce('circle',{key:'a'+i,cx:xs(i),cy:ys(d[k1]),r:2.5,fill:'#2b5c3f',stroke:'#fff',strokeWidth:1.2});}),
    data.map(function(d,i){return ce('circle',{key:'b'+i,cx:xs(i),cy:ys(d[k2]),r:2.5,fill:'#b03030',stroke:'#fff',strokeWidth:1.2});})
  );
}

/* ─── LIVE CLOCK ─── */
function LiveClock(){
  var st=useState(function(){var n=new Date();return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');});
  var time=st[0]; var setTime=st[1];
  React.useEffect(function(){
    var tick=setInterval(function(){
      var n=new Date();
      setTime(String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0'));
    },1000);
    return function(){clearInterval(tick);};
  },[]);
  return ce('div',{style:{display:'flex',alignItems:'center',gap:6,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:6,padding:'4px 10px'}},
    ce('svg',{width:12,height:12,viewBox:'0 0 16 16',fill:'var(--text3)'},
      ce('path',{d:'M8 3.5a.5.5 0 0 0-1 0V9a.5.5 0 0 0 .252.434l3.5 2a.5.5 0 0 0 .496-.868L8 8.71V3.5z'}),
      ce('path',{d:'M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zm7-8A7 7 0 1 1 1 8a7 7 0 0 1 14 0z'})
    ),
    ce('span',{style:{fontFamily:'var(--font-mono)',fontSize:13,fontWeight:600,color:'var(--text2)',letterSpacing:'.04em'}},time),
    ce('span',{style:{fontSize:10,color:'var(--text3)'}},'current time')

}

  var sFiles=useState([]); var uploadedFiles=sFiles[0]; var setUploadedFiles=sFiles[1];

  var sOCRLog=useState([]); var ocrLog=sOCRLog[0]; var setOcrLog=sOCRLog[1];

  /* container match */
  function findMatch(cont){
    if(!cont) return null;
    var n=cont.trim().toUpperCase().replace(/\s+/g,'');
    return batches.find(function(b){var bc=(b.container||'').toUpperCase().replace(/\s+/g,'');return bc&&bc===n;});
  }
  var matchedBatch=findMatch(fContainer);

  /* OCR a single file via Claude API */
  function ocrFile(file, idx, total, onDone){
    var reader=new FileReader();
    reader.onload=function(ev){
      var b64=ev.target.result.split(',')[1];
      var mediaType=file.type||'image/jpeg';
      // For PDFs use document type, images use image type
      var contentBlock=mediaType==='application/pdf'
        ?{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}}
        :{type:'image',source:{type:'base64',media_type:mediaType,data:b64}};
      fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:1500,
          messages:[{role:'user',content:[
            contentBlock,
            {type:'text',text:'This is a client QC intake/inspection report for citrus from Egypt (Daltex). Extract all available data and respond ONLY with a valid JSON object (no markdown, no explanation):\n{\n  "container": "container number e.g. MNBU3564353",\n  "qcReportNumber": "report/PO/batch reference number",\n  "client": "client company name",\n  "subClient": "retailer if mentioned e.g. Lidl, Tesco, Waitrose",\n  "variety": "citrus variety",\n  "lot": "lot number",\n  "traceCode": "traceability code",\n  "ggn": "GGN number",\n  "packhouse": "packhouse name",\n  "inspectionDate": "date in YYYY-MM-DD",\n  "brix": "average brix value as number or null",\n  "avgSize": "average diameter in mm or null",\n  "minSize": "min diameter mm or null",\n  "maxSize": "max diameter mm or null",\n  "totalDefectPct": "total defect % as number or null",\n  "minorDefectPct": "minor defects % as number or null",\n  "majorDefectPct": "major defects % as number or null",\n  "blemishScarringPct": "blemish/scarring/skin damage % or null",\n  "bruisingOilPct": "bruising/oil/rind breakdown % or null",\n  "softnessPct": "softness/puffiness % or null",\n  "colorationPct": "poor coloration/green % or null",\n  "heavyScarringCount": "count of heavy scarring if mentioned or null",\n  "palletsCount": "number of pallets or null",\n  "score": "client score or status e.g. GREEN, AMBER, RED, PASS, FAIL or null",\n  "decision": "A if accepted/pass/green, R if rejected/fail/red, null if unclear",\n  "temperature": "temperature reading if mentioned",\n  "notes": "key QC observations in one sentence"\n}'}
          ]}]
        })
      })
      .then(function(r){return r.json();})
      .then(function(data){
        var text=(data.content&&data.content[0]&&data.content[0].text)||'';
        try{
          var clean=text.replace(/```json|```/g,'').trim();
          var parsed=JSON.parse(clean);
          onDone(null,parsed,file.name);
        }catch(e){onDone('parse error: '+text.slice(0,100),null,file.name);}
      })
      .catch(function(e){onDone('API error: '+e.message,null,file.name);});
    };
    reader.readAsDataURL(file);
  }

  /* merge OCR results from multiple files into form */
  function applyOCRResult(parsed){
    if(parsed.container&&!fContainer) setContainer(parsed.container.toUpperCase());
    if(parsed.qcReportNumber&&!fQCRef) setQCRef(parsed.qcReportNumber);
    if(parsed.client&&!fClient) setClient(parsed.client);
    if(parsed.subClient&&!fSubClient) setSubClient(parsed.subClient);
    if(parsed.variety&&!fVar) setVar(parsed.variety);
    if(parsed.lot&&!fLot) setLot(String(parsed.lot));
    if(parsed.traceCode&&!fTrace) setTrace(parsed.traceCode);
    if(parsed.packhouse&&!fPH) setPH(parsed.packhouse);
    if(parsed.inspectionDate&&!fPackDate) setPackDate(parsed.inspectionDate);
    if(parsed.brix!=null&&!fBrix) setBrix(String(parsed.brix));
    if(parsed.totalDefectPct!=null&&!fTotalDef) setTotalDef(String(parsed.totalDefectPct));
    if(parsed.minorDefectPct!=null&&!fBlemish) setBlemish(String(parsed.minorDefectPct));
    if(parsed.bruisingOilPct!=null&&!fBruising) setBruising(String(parsed.bruisingOilPct));
    if(parsed.softnessPct!=null&&!fSoftness) setSoftness(String(parsed.softnessPct));
    if(parsed.colorationPct!=null&&!fColoration) setColoration(String(parsed.colorationPct));
    if(parsed.score&&!fScore) setScore(parsed.score);
    if(parsed.decision&&!fScore) setScore(parsed.decision==='A'?'GREEN':parsed.decision==='R'?'RED':'');
    if(parsed.temperature&&!fTempLogger) setTempLogger(parsed.temperature);
    if(parsed.notes&&!fGeneral) setGeneral(parsed.notes);
  }

  function runOCRAll(files){
    if(!files||!files.length) return;
    setOcrStatus('reading');
    setOcrLog([]);
    var results=[];
    var pending=files.length;
    files.forEach(function(file,i){
      ocrFile(file,i,files.length,function(err,parsed,name){
        if(err){
          results.push({name:name,status:'error',msg:err});
        } else {
          results.push({name:name,status:'ok',data:parsed});
          applyOCRResult(parsed);
        }
        pending--;
        setOcrLog(results.slice());
        if(pending===0) setOcrStatus('done');
      });
    });
  }

  function handleFiles(newFiles){
    var arr=Array.from(newFiles);
    setUploadedFiles(function(prev){return prev.concat(arr);});
    runOCRAll(arr);
  }

  function removeFile(idx){
    setUploadedFiles(function(prev){return prev.filter(function(_,i){return i!==idx;});});
  }

      savedAt:new Date().toISOString()
    };

  /* score color */
  function scoreColor(s){
    var su=(s||'').toUpperCase();

  var sComment=useState(''); var comment=sComment[0]; var setComment=sComment[1];
  var sConfirm=useState(false); var showConfirm=sConfirm[0]; var setShowConfirm=sConfirm[1];
  var sFilter=useState('Pending'); var filter=sFilter[0]; var setFilter=sFilter[1];

                  ce('div',{style:{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:8}},'Defect summary'),
                  ce('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}},
                    [['Total defect',selB.totalDefect.toFixed(1)+'%'],['Variety',selB.variety],['Brix',selB.brix+'°Bx'],['Farm',selB.farm],['Client',selB.client],['Date',selB.date]].map(function(item){
                      return ce('div',{key:item[0],style:{background:'var(--bg2)',borderRadius:6,padding:'6px 9px'}},
                        ce('div',{style:{fontSize:9,color:'var(--text3)',textTransform:'uppercase',marginBottom:1}},item[0]),
                        ce('div',{style:{fontSize:12,fontWeight:500}},item[1])
                      );
                    })
                  )
                ),

                /* Decision buttons */
                ce('div',{style:{marginBottom:14}},
                  ce('div',{style:{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:8}},'Board decision'),
                  ce('div',{style:{display:'flex',gap:8,marginBottom:10}},
                    ce('button',{style:{flex:1,padding:'12px 8px',borderRadius:8,border:'2px solid '+(pendingDecision==='SA'?'#6a10b0':'#c090e0'),background:pendingDecision==='SA'?'#6a10b0':'#f0e8ff',color:pendingDecision==='SA'?'#fff':'#6a10b0',fontWeight:700,cursor:'pointer',fontSize:13,transition:'all .15s'},onClick:function(){setPendingDecision('SA');}},
                      ce('div',null,'\u2605 Special Accept'),
                      ce('div',{style:{fontSize:10,fontWeight:400,marginTop:2,opacity:.8}},'Override — allow for export')
                    ),
                    ce('button',{style:{flex:1,padding:'12px 8px',borderRadius:8,border:'2px solid '+(pendingDecision==='SR'?'#b04010':'#e0b090'),background:pendingDecision==='SR'?'#b04010':'#fff0e8',color:pendingDecision==='SR'?'#fff':'#b04010',fontWeight:700,cursor:'pointer',fontSize:13,transition:'all .15s'},onClick:function(){setPendingDecision('SR');}},
                      ce('div',null,'\u2605 Special Reject'),
                      ce('div',{style:{fontSize:10,fontWeight:400,marginTop:2,opacity:.8}},'Confirm — cannot export')
                    )
                  )
                ),

                /* Comment */
                pendingDecision&&ce('div',{style:{marginBottom:14}},
                  ce('label',{className:'form-label'},
                    pendingDecision==='SA'?'Exception justification (required)':'Comment (optional)',
                    pendingDecision==='SA'&&ce('span',{style:{color:'var(--red)',marginLeft:4}},'*')
                  ),
                  ce('textarea',{className:'form-input',rows:3,value:comment,onChange:function(e){setComment(e.target.value);},placeholder:pendingDecision==='SA'?'State the commercial or technical reason for accepting despite failed QC...':'Reason for confirming rejection...',style:{resize:'vertical',marginTop:4}})
                ),

                /* Submit */
                pendingDecision&&ce('button',{
                  className:'btn btn-primary',style:{width:'100%',justifyContent:'center',padding:'10px',fontSize:14,background:pendingDecision==='SA'?'#6a10b0':'#b04010',borderColor:pendingDecision==='SA'?'#6a10b0':'#b04010',opacity:(pendingDecision==='SA'&&!comment.trim())?.4:1},
                  onClick:submitDecision
                },'\u2605 Confirm '+(pendingDecision==='SA'?'Special Accept':'Special Reject')),

                pendingDecision==='SA'&&!comment.trim()&&ce('div',{style:{fontSize:11,color:'var(--red)',textAlign:'center',marginTop:6}},'Comment required for Special Accept')
              )
        )
      )
    )
  );
}

/* MAIN APP */
var DALOS_VERSION='v5'; /* bump to clear stale localStorage */
(function(){
  try{
    if(localStorage.getItem('dalos_version')!==DALOS_VERSION){
      ['dalos_config','dalos_batches','dalos_users','dalos_cqc','dalos_cqc_reports'].forEach(function(k){localStorage.removeItem(k);});
      localStorage.setItem('dalos_version',DALOS_VERSION);
    }
  }catch(e){}
})();
function App(){
  var sUser=useState(null); var currentUser=sUser[0]; var setCurrentUser=sUser[1];
  var sc=useState(null); var cropId=sc[0]; var setCropId=sc[1];
  var sph=useState(null); var phId=sph[0]; var setPhId=sph[1];
  var sv=useState('fg'); var view=sv[0]; var setView=sv[1];
  var sMob=useState(false); var mobOpen=sMob[0]; var setMobOpen=sMob[1];
  var sCfg=useState(function(){try{var s=localStorage.getItem('dalos_config');return s?JSON.parse(s):INITIAL_CONFIG;}catch(e){return INITIAL_CONFIG;}}); var config=sCfg[0]; var setConfigRaw=sCfg[1];
  function setConfig(v){setConfigRaw(v);try{localStorage.setItem('dalos_config',JSON.stringify(v));}catch(e){}}
  var sBatches=useState(function(){try{var s=localStorage.getItem('dalos_batches');return s?JSON.parse(s):BATCHES;}catch(e){return BATCHES;}}); var batches=sBatches[0]; var setBatchesRaw=sBatches[1];
  function setBatches(v){var next=typeof v==='function'?v:function(){return v;};setBatchesRaw(function(prev){var n=next(prev);try{localStorage.setItem('dalos_batches',JSON.stringify(n));}catch(e){}return n;});}
  var sUsers=useState(function(){try{var s=localStorage.getItem('dalos_users');return s?JSON.parse(s):INITIAL_USERS;}catch(e){return INITIAL_USERS;}}); var users=sUsers[0]; var setUsersRaw=sUsers[1];
  function setUsers(v){var next=typeof v==='function'?v:function(){return v;};setUsersRaw(function(prev){var n=next(prev);try{localStorage.setItem('dalos_users',JSON.stringify(n));}catch(e){}return n;});}
  var sAlerts=useState(batches.filter(function(b){return b.status==='Hold'||b.status==='Escalated';}).map(function(b){return {id:b.id,msg:b.id+' \u2014 '+b.status+(b.escalationNote?' \u00b7 '+b.escalationNote.slice(0,40):''),batchId:b.id};})); var sideAlerts=sAlerts[0]; var setSideAlerts=sAlerts[1];
  function dismissAlert(id){setSideAlerts(function(prev){return prev.filter(function(a){return a.id!==id;});});}
  function updateBatch(id,changes){
    setBatches(function(prev){
      var next=prev.map(function(b){return b.id===id?Object.assign({},b,changes):b;});
      /* auto-update alerts when status resolves */
      setSideAlerts(function(alerts){return alerts.filter(function(a){
        var updated=next.find(function(b){return b.id===a.batchId;});
        if(!updated) return false;
        return updated.status==='Hold'||updated.status==='Escalated';
      });});
      return next;
    });
  }
  function addBatch(newBatch){setBatches(function(prev){return prev.concat([newBatch]);});}
  function escalateBatch(id,note,byUser){
    updateBatch(id,{status:'Escalated',escalatedBy:byUser,escalatedAt:new Date().toLocaleString(),escalationNote:note});
    setSideAlerts(function(prev){
      if(prev.find(function(a){return a.id===id;})) return prev;
      return prev.concat([{id:id,msg:id+' \u2014 Escalated \u00b7 '+note.slice(0,40),batchId:id}]);
    });
  }
  function boardDecide(id,decision,comment,byUser){
    var newStatus=decision==='SA'?'Special Accept':'Special Reject';
    updateBatch(id,{decision:decision,status:newStatus,boardComment:comment,boardDecidedBy:byUser,boardDecidedAt:new Date().toLocaleString()});
  }
  function signOut(){setCurrentUser(null);setCropId(null);setPhId(null);setView('fg');}
  /* Always read the latest user data from users state so admin edits reflect immediately */
  var liveCurrentUser=currentUser?users.find(function(u){return u.id===currentUser.id;})||currentUser:null;
  if(!liveCurrentUser) return ce(LoginScreen,{users:users,onLogin:function(u){
    setCurrentUser(u);
    if(u.packhouses&&u.packhouses.length===1&&u.packhouses[0]!=='All') setPhId(u.packhouses[0]);
    var r=ROLES[u.role]||ROLES.inspector;
    var p=r.perms;
    if(p.viewEscalation&&!p.viewFG) setView('escalation');
    else if(!p.viewFG&&p.viewClientQC) setView('clientqc');
    else if(!p.viewFG&&p.viewAnalytics) setView('analytics');
    else if(!p.viewFG&&p.viewExport) setView('export');
    else if(!p.viewFG&&p.viewAdmin) setView('admin');
    else setView('fg');
  }});
  var role=ROLES[liveCurrentUser.role]||ROLES.inspector;
  var perms=role.perms;
  var availViews=[];
  if(perms.viewFG)           availViews.push({id:'fg',         label:'Export Inspection', sub:'FG / Export'});
  if(perms.viewClientQC)     availViews.push({id:'clientqc',   label:'Client QC',         sub:'Reports & matching'});
  if(perms.viewAnalytics)    availViews.push({id:'analytics',  label:'QC Analytics',      sub:'Dashboard'});
  if(perms.viewExport)       availViews.push({id:'export',     label:'Export data',       sub:'CSV / Tableau'});
  if(perms.viewEscalation)   availViews.push({id:'escalation', label:'Board Review',      sub:'Escalation queue'});
  if(perms.viewAdmin)        availViews.push({id:'admin',      label:'Admin',             sub:'Users & access'});
  var cropInfo=CROPS.find(function(c){return c.id===cropId;})||{name:'',color:'#2b5c3f'};
  var phInfo=PACKHOUSES.find(function(p){return p.id===phId;})||{name:phId||'',color:'#2b5c3f',initials:'--'};
  var cur=availViews.find(function(v){return v.id===view;})||availViews[0]||{label:'',id:''};
  var needsCropPH=perms.viewFG&&(!cropId||!phId)&&view!=='admin'&&view!=='analytics'&&view!=='export'&&view!=='clientqc'&&view!=='escalation';

  function mkSidebar(){
    return ce(React.Fragment,null,
      /* overlay for mobile */
      ce('div',{className:'sidebar-overlay'+(mobOpen?' open':''),onClick:function(){setMobOpen(false);}}),
      ce('div',{className:'sidebar'+(mobOpen?' open':'')},
        ce('div',{className:'sidebar-logo'},
          ce('div',{className:'sidebar-logo-mark'},ce('span',{style:{color:'#fff'}},'Dal'),ce('span',{style:{color:'var(--accent2)'}},'OS'),ce('span',{style:{color:'var(--sidebar-muted)',fontFamily:'var(--font-body)',fontSize:14,fontWeight:500,marginLeft:4}},'Vision')),
          phInfo.name&&ce('div',{className:'sidebar-logo-crop'},ce('div',{className:'sidebar-dot',style:{background:phInfo.color}}),phInfo.name),
          cropInfo.name&&ce('div',{style:{fontSize:10,color:'var(--sidebar-muted)',marginTop:2,display:'flex',alignItems:'center',gap:5}},
            ce('div',{className:'sidebar-dot',style:{background:cropInfo.color,width:5,height:5}}),cropInfo.name)
        ),
        ce('div',{className:'sidebar-sec'},'Modules'),
        availViews.map(function(v){
          return ce('div',{key:v.id,className:'nav-item'+(view===v.id?' active':''),onClick:function(){setView(v.id);setMobOpen(false);}},
            ce('svg',{viewBox:'0 0 16 16',fill:'currentColor',className:'nav-icon'},ce('path',{d:IPATHS[v.id]||IPATHS.fg})),
            ce('div',null,ce('div',{style:{lineHeight:1.2}},v.label),ce('div',{style:{fontSize:10,opacity:.5,marginTop:1}},v.sub))
          );
        }),
        ce('div',{className:'sidebar-sec',style:{marginTop:6}},'Alerts'),
        sideAlerts.length===0
          ? ce('div',{style:{margin:'2px 8px',padding:'5px 10px',fontSize:11,color:'var(--sidebar-muted)',fontStyle:'italic'}},'No active alerts')
          : sideAlerts.map(function(a){
              return ce('div',{key:a.id,style:{margin:'2px 8px',padding:'6px 10px',borderRadius:5,background:'rgba(176,48,48,.14)',borderLeft:'2px solid #b03030',fontSize:11,color:'#e89090',lineHeight:1.4,display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:4}},
                ce('span',null,a.msg),
                ce('button',{style:{background:'none',border:'none',color:'#e89090',cursor:'pointer',fontSize:13,lineHeight:1,flexShrink:0,padding:0},onClick:function(){dismissAlert(a.id);}},'\u00d7')
              );
            }),
        ce('div',{className:'sidebar-bottom'},
          ce('div',{style:{margin:'2px 8px 8px',padding:'7px 10px',borderRadius:6,background:'rgba(255,255,255,.07)',display:'flex',alignItems:'center',gap:8}},
            ce('div',{style:{width:26,height:26,borderRadius:'50%',background:role.badge,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,color:'#fff',flexShrink:0}},
              liveCurrentUser.name.split(' ').map(function(n){return n[0];}).slice(0,2).join('')),
            ce('div',{style:{overflow:'hidden'}},
              ce('div',{style:{fontSize:12,color:'var(--sidebar-text)',fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},currentUser.name),
              ce('div',{style:{fontSize:10,color:'var(--sidebar-muted)'}},role.label)
            )
          ),
          perms.viewFG&&(cropId||phId)&&ce('div',{className:'nav-item',style:{fontSize:12},onClick:function(){setCropId(null);if(perms.allPackhouses)setPhId(null);setMobOpen(false);}},
            ce('svg',{viewBox:'0 0 16 16',fill:'currentColor',className:'nav-icon'},ce('path',{d:'M11 2.5a.5.5 0 0 0-.5-.5H3a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h7.5a.5.5 0 0 0 .5-.5v-1a.5.5 0 0 0-.5-.5H3a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h7.5a.5.5 0 0 0 .5-.5v-1zm1.854 4.646a.5.5 0 0 0 0 .708l1.792 1.792-1.792 1.792a.5.5 0 0 0 .707.707l2.146-2.145a.5.5 0 0 0 0-.708L13.56 7.147a.5.5 0 0 0-.707.707z'})),
            ce('div',null,'Switch crop')
          ),
          ce('div',{className:'nav-item',style:{fontSize:12},onClick:signOut},
            ce('svg',{viewBox:'0 0 16 16',fill:'currentColor',className:'nav-icon'},ce('path',{d:'M10 12.5a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v2a.5.5 0 0 0 1 0v-2A1.5 1.5 0 0 0 9.5 2h-8A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-2a.5.5 0 0 0-1 0v2z'})),
            ce('div',null,'Sign out')
          )
        )
      ),
      /* mobile bottom nav */
      ce('div',{className:'mobile-nav'},
        availViews.slice(0,4).map(function(v){
          return ce('div',{key:v.id,className:'mobile-nav-item'+(view===v.id?' active':''),onClick:function(){setView(v.id);}},
            ce('svg',{viewBox:'0 0 16 16',fill:'currentColor',width:18,height:18},ce('path',{d:IPATHS[v.id]||IPATHS.fg})),
            ce('span',null,v.label)
          );
        }),
        ce('div',{className:'mobile-nav-item',onClick:function(){setMobOpen(!mobOpen);}},
          ce('svg',{viewBox:'0 0 16 16',fill:'currentColor',width:18,height:18},ce('path',{d:'M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z'})),
          ce('span',null,'More')
        )
      )
    );
  }

  if(needsCropPH){
    return ce('div',{className:'layout'},mkSidebar(),
      ce('div',{className:'main'},ce(Landing,{currentUser:liveCurrentUser,config:config,batches:batches,onSelect:function(pid,cid){
        var phs=currentUser.packhouses||[currentUser.packhouse||'All'];
        var finalPh=(phs.indexOf('All')<0&&phs.length===1)?phs[0]:pid;
        setPhId(finalPh);setCropId(cid);setView('fg');
      }}))
    );
  }

  return ce('div',{className:'layout'},mkSidebar(),
    ce('div',{className:'main'},
      cur.id&&ce('div',{className:'topbar'},
        ce('div',{className:'topbar-left'},
          ce('div',{className:'menu-btn',onClick:function(){setMobOpen(!mobOpen);}},
            ce('svg',{width:18,height:18,viewBox:'0 0 16 16',fill:'#fff'},ce('path',{d:'M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z'}))
          ),
          ce('div',{className:'topbar-title'},cur.label),
          phInfo.name&&ce('div',{style:{display:'flex',alignItems:'center',gap:6,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:6,padding:'3px 10px'}},
            ce('span',{style:{fontSize:11,fontWeight:600,color:phInfo.color}},phInfo.name),
            cropInfo.name&&ce('span',{style:{fontSize:11,color:'var(--text3)'}},' \u00b7 '),
            cropInfo.name&&ce('div',{style:{width:8,height:8,borderRadius:'50%',background:cropInfo.color,flexShrink:0}}),
            cropInfo.name&&ce('span',{style:{fontSize:11,color:'var(--text2)',fontWeight:500}},cropInfo.name)
          )
        ),
        ce('div',{className:'topbar-right'},ce('span',{style:{fontSize:11,color:'var(--text3)'}},'Season 2025/26 \u00b7 Mar 2026'))
      ),
      ce('div',{className:'page'},
        view==='fg'         &&perms.viewFG        &&ce(FGView,{packhouse:phInfo,perms:perms,cropId:cropId,config:config,batches:batches,onEscalate:escalateBatch,currentUser:liveCurrentUser,onAddBatch:addBatch,currentUserObj:currentUser}),
        view==='analytics'  &&perms.viewAnalytics &&ce(AnalyticsView,null),
        view==='export'     &&perms.viewExport    &&ce(ExportView,{phId:phId}),
        view==='clientqc'   &&perms.viewClientQC  &&ce(ClientQCMgmt,{batches:batches}),
        view==='escalation' &&perms.viewEscalation&&ce(EscalationReview,{batches:batches,perms:perms,currentUser:liveCurrentUser,onDecide:boardDecide}),
        view==='admin'      &&perms.viewAdmin     &&ce(AdminCenter,{users:users,setUsers:setUsers,config:config,setConfig:setConfig})
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(ce(App,null));
</script>
